name: Windows Installer EXE Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  exe:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem 'C:\Program Files*\WiX Toolset*' -Recurse -Filter candle.exe | Select-Object -First 1
          if (-not $candle) {
            throw 'WiX candle.exe was not found after installation.'
          }
          $wixBin = $candle.Directory.FullName
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build EXE installer
        run: .\gradlew.bat jpackage --no-daemon

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: atcs-exe
          path: build/**/*.exe
