name: Windows Installer Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem 'C:\Program Files*\WiX Toolset*' -Recurse -Filter candle.exe | Select-Object -First 1
          if (-not $candle) {
            throw 'WiX candle.exe was not found after installation.'
          }
          $wixBin = $candle.Directory.FullName
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and Package Windows Installer
        run: .\gradlew.bat packageWindowsExe --no-daemon

      - name: Build and Package Windows MSI Installer
        run: .\gradlew.bat packageWindowsMsi --no-daemon

      - name: Upload EXE artifact (ends up in separate artifact .zip)
        uses: actions/upload-artifact@v4
        with:
          name: atcs-exe
          path: build/distrubutions/*.exe

      - name: Upload MSI artifact (ends up in separate artifact .zip)
        uses: actions/upload-artifact@v4
        with:
          name: atcs-msi
          path: build/distrubutions/*.msi
