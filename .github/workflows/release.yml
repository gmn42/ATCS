name: Release Build

permissions:
  contents: write

on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-linux-zip:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk

    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          echo "Reading version from file:"
          cat res/ATCS_latest
          echo ""
          VERSION=$(tr -d '[:space:]' < "res/ATCS_latest")
          VERSION="${VERSION#v}"
          echo "Processed version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Environment variable set to: $VERSION"

      - name: Build Shadow JAR and ZIP
        shell: bash
        run: |
          echo "Building shadow JAR and ZIP for version: ${{ env.VERSION }}"
          ./gradlew packageZip --no-daemon
          echo "Created artifacts:"
          ls -la build/distributions/ATCS-${{ env.VERSION }}.zip

      - name: Upload Release Assets (zip)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./build/distributions/ATCS-${{ env.VERSION }}*.zip

      - name: 'Install makensis (apt)'
        run: sudo apt update && sudo apt install -y nsis nsis-pluginapi
        continue-on-error: true

      - name: Create Windows-Installer with NSIS
        uses: joncloud/makensis-action@v4
        with:
          script-file: packaging/Windows/ATCS_Installer.nsi
          arguments: -DVERSION="${{ env.VERSION }}"
        continue-on-error: true

      - name: Upload Release Assets (legacy exe)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ./packaging/ATCS_${{ env.VERSION }}_Setup.exe
        continue-on-error: true

  build-linux-deb:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk

    steps:
      - uses: actions/checkout@v4

      - name: Build Linux DEB
        run: ./gradlew --no-daemon packageLinuxDeb

      - name: Upload Release Assets (deb)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            build/distributions/*.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    container: eclipse-temurin:21-jdk

    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        run: |
          apt-get update
          apt-get install -y rpm git findutils tar unzip

      - name: Build Linux RPM
        run: ./gradlew --no-daemon packageLinuxRpm

      - name: Upload Release Assets (rpm)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            build/distributions/*.rpm

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem 'C:\Program Files*\WiX Toolset*' -Recurse -Filter candle.exe | Select-Object -First 1
          if (-not $candle) {
            throw 'WiX candle.exe was not found after installation.'
          }
          $wixBin = $candle.Directory.FullName
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows installers
        run: .\gradlew.bat packageWindowsExe packageWindowsMsi --no-daemon

      - name: Upload Release Assets (exe)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            build/distributions/*.exe

      - name: Upload Release Assets (msi)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            build/distributions/*.msi
