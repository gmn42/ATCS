plugins {
    id 'application'
    id 'java'
}

group = 'com.gpl.rpg.atcontentstudio'
version = file('res/ATCS_latest').text.trim()

def mainClassNameValue = 'com.gpl.rpg.atcontentstudio.ATContentStudio'
def appVersion = version.toString()

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(25))
    }
    withSourcesJar()
}

application {
    mainClass.set(mainClassNameValue)
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java {
            setSrcDirs([
                    'src',
                    'hacked-libtiled',
                    'minify',
                    'siphash-zackehh/src/main/java'
            ])
        }
        resources {
            setSrcDirs([
                    'res',
                    'src'
            ])
            exclude '**/*.java'
        }
    }

    test {
        java {
            setSrcDirs([

            ])
        }
    }
}

configurations.all {
    resolutionStrategy {
        failOnVersionConflict()
    }
}

dependencies {
    implementation fileTree(dir: 'lib', include: ['*.jar'])

    testImplementation fileTree(dir: 'lib', include: ['junit-*.jar'])
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 17
}

tasks.withType(Jar).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.named('processResources') {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.named('jar', Jar) {
    archiveBaseName.set('ATCS-thin')
    manifest {
        attributes('Main-Class': mainClassNameValue)
    }
}

tasks.register('fatJar', Jar) {
    group = 'build'
    description = 'Builds a runnable fat jar similar to the legacy packaging script.'

    // use provider-style API to avoid deprecation warnings on Gradle 9.x
    archiveBaseName.set('ATCS')
    archiveVersion.set('')
    archiveClassifier.set('')

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    manifest {
        attributes(
                'Manifest-Version': '1.0',
                'Main-Class': mainClassNameValue
        )
    }

    from sourceSets.main.output

    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath
                .findAll { it.name.toLowerCase().endsWith('.jar') }
                .collect { zipTree(it) }
    }

    from('src/com/gpl/rpg/atcontentstudio/img') {
        into 'com/gpl/rpg/atcontentstudio/img'
    }

    from('hacked-libtiled/tiled/io/resources') {
        into 'tiled/io/resources'
    }

    from('res/ATCS_latest')
}

def distCommonDirProvider = layout.buildDirectory.dir('dist/common')

tasks.register('prepareDistCommon', Copy) {
    group = 'distribution'
    description = 'Prepares the common distribution directory.'

    dependsOn tasks.named('fatJar')

    into distCommonDirProvider

    from(tasks.named('fatJar')) {
        rename { 'ATCS.jar' }
    }

    from('packaging/common') {
        include 'ATCS.sh', 'ATCS.cmd', 'ATCS.ico'
    }

    from('lib') {
        include '*.jar'
        into 'lib'
    }
}

tasks.register('packageZip', Zip) {
    group = 'distribution'
    description = 'Builds a zip archive similar to packaging/package.sh.'

    dependsOn tasks.named('prepareDistCommon')
    // use provider-style archive properties
    archiveBaseName.set('ATCS')
    archiveVersion.set(appVersion)
    archiveClassifier.set('')
    destinationDirectory = layout.buildDirectory.dir('distributions')

    from(distCommonDirProvider) {
        into 'common'
    }
}

tasks.named('assemble') {
    dependsOn tasks.named('fatJar')
}

tasks.named('build') {
    dependsOn tasks.named('packageZip')
}

// Centralized jpackage executable provider
def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
def jpackageExeName = isWindows ? 'jpackage.exe' : 'jpackage'

// Priority:
// 1) -PjpackageJdk=/path/to/jdk
// 2) JAVA_HOME
// 3) Gradle toolchain (requests a JDK 21 and optional vendor via -PjpackageVendor)
def jpackageExecutableProvider
if (project.hasProperty('jpackageJdk')) {
    jpackageExecutableProvider = providers.provider {
        file(project.property('jpackageJdk').toString()).toPath().resolve("bin/${jpackageExeName}").toFile().absolutePath
    }
} else if (System.getenv('JAVA_HOME')) {
    jpackageExecutableProvider = providers.provider {
        file(System.getenv('JAVA_HOME')).toPath().resolve("bin/${jpackageExeName}").toFile().absolutePath
    }
} else {
    jpackageExecutableProvider = javaToolchains.launcherFor {
        languageVersion.set(JavaLanguageVersion.of(21))
        if (project.hasProperty('jpackageVendor')) {
            vendor.set(JvmVendorSpec.matching(project.property('jpackageVendor').toString()))
        }
    }.map { launcher ->
        new File(launcher.metadata.installationPath.asFile, 'bin' + File.separator + jpackageExeName).absolutePath
    }
}


// Prepare input directory for jpackage
tasks.register('prepareJpackageInput', Copy) {
    group = 'distribution'
    description = 'Prepare files for jpackage (copies fatJar into input dir)'

    dependsOn tasks.named('fatJar')

    from tasks.named('fatJar').flatMap { it.archiveFile }
    into layout.buildDirectory.dir('jpackage/input')
    rename { 'ATCS.jar' }
}

// (args builder inlined into tasks to avoid closure delegation issues)

// Exec task to create app-image using jpackage (configuration-cache friendly)
tasks.register('jpackageImage', Exec) {
    group = 'distribution'
    description = 'Creates an app-image using jpackage'
    dependsOn tasks.named('prepareJpackageInput')

    doFirst {
        def exePath = jpackageExecutableProvider.get()
        if (!file(exePath).exists()) {
            throw new GradleException("jpackage not found at: ${exePath}. Provide -PjpackageJdk or set JAVA_HOME or use -PjpackageVendor to select a toolchain vendor that provides jpackage.")
        }
        executable = exePath

        def inputDir = layout.buildDirectory.dir('jpackage/input').get().asFile.absolutePath
        def destDir = layout.buildDirectory.dir('jpackage/image').get().asFile.absolutePath
        file(destDir).mkdirs()

        def type = (project.findProperty('jpackageType') ?: 'app-image').toString()
        def name = (project.findProperty('jpackageName') ?: 'ATCS').toString()
        def appVer = (project.findProperty('jpackageAppVersion') ?: version.toString()).toString()
        def extra = (project.findProperty('jpackageExtraArgs') ?: '')

        def argsList = []
        argsList += '--type'; argsList += type
        argsList += '--input'; argsList += inputDir
        argsList += '--main-jar'; argsList += 'ATCS.jar'
        argsList += '--name'; argsList += name
        argsList += '--app-version'; argsList += appVer
        argsList += '--dest'; argsList += destDir
        if (extra) {
            argsList.addAll(extra.split('\\s+'))
        }
        args = argsList
    }
}

// Exec task to create native installer (delegates to jpackage)
tasks.register('jpackageInstaller', Exec) {
    group = 'distribution'
    description = 'Creates a native installer with jpackage (type controlled by -PjpackageType)'
    dependsOn tasks.named('prepareJpackageInput')

    doFirst {
        def exePath = jpackageExecutableProvider.get()
        if (!file(exePath).exists()) {
            throw new GradleException("jpackage not found at: ${exePath}. Provide -PjpackageJdk or set JAVA_HOME or use -PjpackageVendor to select a toolchain vendor that provides jpackage.")
        }
        executable = exePath

        def inputDir = layout.buildDirectory.dir('jpackage/input').get().asFile.absolutePath
        def destDir = layout.buildDirectory.dir('jpackage/installer').get().asFile.absolutePath
        file(destDir).mkdirs()

        def type = (project.findProperty('jpackageType') ?: 'app-image').toString()
        def name = (project.findProperty('jpackageName') ?: 'ATCS').toString()
        def appVer = (project.findProperty('jpackageAppVersion') ?: version.toString()).toString()
        def extra = (project.findProperty('jpackageExtraArgs') ?: '')

        def argsList = []
        argsList += '--type'; argsList += type
        argsList += '--input'; argsList += inputDir
        argsList += '--main-jar'; argsList += 'ATCS.jar'
        argsList += '--name'; argsList += name
        argsList += '--app-version'; argsList += appVer
        argsList += '--dest'; argsList += destDir
        if (extra) {
            argsList.addAll(extra.split('\\s+'))
        }
        args = argsList
    }
}

